<!-- 
    Purpose: Demonstrates the use of nested unordered lists in HTML.
    Structure:
    - Main heading for the page.
    - Secondary heading for the course list.
    - A multi-level unordered list categorizing different courses (DSA, Web Technologies, etc.).
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Unordered List</title>
</head>
<body>
    <h1>Nested Unordered List</h1>
    <h2>Geeks for geeks courses list</h2>
    
    <!-- Main Course List -->
    <ul>
        <li>Dsa
            <!-- Nested list for DSA topics -->
            <ul>
                <li>Array</li>
                <li>Linked List</li>
                <li>Stack</li>
                <li>Queue</li>
            </ul> 
        </li>
        <li>Web technologies
            <!-- Nested list for Web topics -->
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>Javascript</li>
            </ul>
        </li>
        <li>Aptitude</li>
        <li>gate</li>
        <li>Placement</li>
    </ul> 
</body>
</html>
