<!-- 
    Purpose: Demonstrates a complex table layout with nested subtitles and sub-subtitles using colspan.
    Logic Flow:
    - The table header contains a main title spanning 4 columns.
    - A second header row provides two subtitles, each spanning 2 columns.
    - The body contains data rows with four items each.
    - A footer-style row provides sub-subtitles at the bottom.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Subtitles Table</title>
    <link rel="stylesheet" href="table1.css">
</head>
<body>
    <table>
        <thead>
            <tr>
                <th colspan="4">TITLE</th>
            </tr>
            <tr>
                <th colspan="2">Subtitle</th>
                <th colspan="2">Subtitle</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1 item</td>
                <td>123</td>
                <td>1 item</td>
                <td>123</td>
            </tr>
            <tr>
                <td>1 item</td>
                <td>123</td>
                <td>1 item</td>
                <td>123</td>
            </tr>
            <tr>
                <td>1 item</td>
                <td>123</td>
                <td>1 item</td>
                <td>123</td>
            </tr>
            <tr>
                <td colspan="2">Sub Subtitle</td>
                <td colspan="2">Sub Subtitle</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
